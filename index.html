<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{AGENT_NAME_PLAIN}} Tool Call Viewer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>{{AGENT_ICON}}</text></svg>">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    h1 { color: #58a6ff; margin: 0; }
    .header-totals { display: flex; gap: 18px; flex-wrap: wrap; }
    .header-stat { color: #8b949e; font-size: 14px; }
    .header-stat span { color: #58a6ff; font-weight: 700; }
    .export-btn, .clear-btn, .pagination button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }
    .export-btn:hover, .clear-btn:hover, .pagination button:hover { background: #30363d; }
    .export-btn { background: #238636; border-color: #2ea043; color: white; }
    .export-btn:hover { background: #2ea043; }
    .stats {
      display: flex;
      gap: 15px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      align-items: stretch;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 18px;
      min-width: 130px;
    }
    .stat-card .value { font-size: 24px; font-weight: 700; color: #58a6ff; }
    .stat-card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; }
    .search-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      min-width: 260px;
      flex: 1;
    }
    .search-card input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 10px;
      border-radius: 6px;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      align-items: center;
    }
    select, input {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
    }
    select:focus, input:focus { outline: none; border-color: #58a6ff; }
    .date-range { display: flex; align-items: center; gap: 6px; }
    .date-sep { color: #8b949e; }
    .dropdown {
      position: relative;
      display: inline-block;
    }
    .dropdown-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      min-width: 180px;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .dropdown-btn::after { content: '▼'; font-size: 10px; margin-left: 10px; }
    .dropdown-btn:hover { border-color: #58a6ff; }
    .dropdown-content {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      min-width: 240px;
      max-height: 360px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .dropdown-content.show { display: block; }
    .dropdown-search { padding: 8px 12px; border-bottom: 1px solid #30363d; }
    .dropdown-search input { width: 100%; background: #0d1117; padding: 6px 8px; }
    .dropdown-actions { padding: 8px 12px; border-bottom: 1px solid #30363d; display: flex; gap: 8px; }
    .dropdown-actions button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .dropdown-actions button:hover { background: #30363d; color: #c9d1d9; }
    .dropdown-item {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .dropdown-item:hover { background: #21262d; }
    .dropdown-item .name { flex: 1; }
    .dropdown-item .count {
      background: #30363d;
      padding: 2px 6px;
      border-radius: 8px;
      font-size: 11px;
      color: #8b949e;
    }
    .monospace { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #161b22;
      border-radius: 8px;
      overflow: hidden;
      table-layout: fixed;
    }
    col.col-tool { width: 90px; }
    col.col-args { width: 48%; }
    col.col-time { width: 130px; }
    col.col-model { width: 130px; }
    col.col-agent { width: 90px; }
    col.col-session { width: 150px; }
    col.col-copy { width: 55px; }
    th {
      background: #21262d;
      padding: 12px 15px;
      text-align: left;
      font-weight: 600;
      color: #8b949e;
      cursor: pointer;
      user-select: none;
      position: sticky;
      top: 0;
    }
    td {
      padding: 10px 15px;
      border-top: 1px solid #21262d;
      vertical-align: top;
    }
    tr:hover { background: #1c2128; }
    .tool-name {
      font-family: 'SF Mono', Monaco, monospace;
      background: #21262d;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 13px;
      color: #f0883e;
      display: inline-block;
    }
    .arguments {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 12px;
      max-height: 100px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
      background: #0d1117;
      padding: 8px;
      border-radius: 4px;
      width: 100%;
      cursor: pointer;
    }
    .arguments:hover { border: 1px solid #30363d; }
    .timestamp, .session-id { color: #8b949e; font-size: 12px; }
    .model { font-size: 11px; color: #7ee787; }
    .pagination {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    .page-info { color: #8b949e; }
    .loading {
      text-align: center;
      padding: 40px;
      color: #8b949e;
      background: #161b22;
      border-radius: 8px;
      border: 1px solid #30363d;
    }
    .copy-toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #238636;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    .copy-toast.show { opacity: 1; }
    .copy-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }
    .copy-btn:hover { background: #30363d; color: #c9d1d9; }
    .refresh-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #8b949e;
      font-size: 0.9em;
    }
    .refresh-toggle input { accent-color: #58a6ff; width: 16px; height: 16px; }
    .refresh-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30363d;
      transition: background 0.3s;
    }
    .refresh-indicator.active { background: #3fb950; }
    @media (max-width: 900px) {
      body { padding: 10px; }
      .controls { flex-direction: column; align-items: stretch; }
      .controls > * { width: 100%; }
      .dropdown, .dropdown-btn, select, input { width: 100%; }
      .date-range { flex-wrap: wrap; }
      .search-card { min-width: auto; }
      col.col-model, col.col-session, col.col-agent { width: auto; }
      table { font-size: 12px; }
      th, td { padding: 8px 6px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>{{AGENT_NAME}} Tool Call Viewer</h1>
    <div class="header-totals">
      <span class="header-stat">TOTAL <span id="total-calls">-</span> calls</span>
      <span class="header-stat"><span id="unique-types">-</span> tools</span>
      <span class="header-stat"><span id="sessions-count">-</span> sessions</span>
      <span class="header-stat"><span id="agents-count">-</span> agents</span>
    </div>
    <button class="export-btn" onclick="exportData()">📥 Export</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="value" id="filtered-calls">-</div><div class="label">Calls</div></div>
    <div class="stat-card"><div class="value" id="filtered-types">-</div><div class="label">Tools</div></div>
    <div class="stat-card"><div class="value" id="filtered-sessions">-</div><div class="label">Sessions</div></div>
    <div class="stat-card"><div class="value" id="indexed-files">-</div><div class="label">Indexed Files</div></div>
    <div class="search-card"><input type="text" id="search" placeholder="Search tools or args..."></div>
    <button class="clear-btn" onclick="clearFilters()">✕ Clear</button>
  </div>

  <div class="controls">
    <div class="dropdown" id="tool-dropdown"></div>
    <div class="dropdown" id="model-dropdown"></div>
    <div class="dropdown" id="agent-dropdown"></div>
    <div class="dropdown" id="session-dropdown"></div>
    <div class="date-range">
      <label>Date:</label>
      <input type="date" id="date-from">
      <span class="date-sep">–</span>
      <input type="date" id="date-to">
    </div>
    <div>
      <label>History:</label>
      <select id="archived-mode">
        <option value="exclude" selected>Active only</option>
        <option value="include">Active + archived</option>
        <option value="only">Archived only</option>
      </select>
    </div>
    <div>
      <label>Per page:</label>
      <select id="per-page">
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="250">250</option>
        <option value="500">500</option>
      </select>
    </div>
    <div>
      <label>Sort:</label>
      <select id="sort-field">
        <option value="timestamp" selected>Time</option>
        <option value="name">Tool</option>
        <option value="model">Model</option>
        <option value="agent">Agent</option>
        <option value="sessionId">Session</option>
      </select>
      <select id="sort-order">
        <option value="desc" selected>↓ Desc</option>
        <option value="asc">↑ Asc</option>
      </select>
    </div>
    <div>
      <label class="refresh-toggle">
        <input type="checkbox" id="auto-refresh-toggle" checked>
        <span>Live updates</span>
        <span class="refresh-indicator" id="refresh-indicator"></span>
      </label>
    </div>
  </div>

  <div id="content"><div class="loading">Loading tool calls...</div></div>
  <div class="pagination" id="pagination"></div>
  <div class="copy-toast" id="copy-toast">Copied to clipboard!</div>

  <script>
    const state = {
      currentPage: 1,
      meta: null,
      items: [],
      eventSource: null,
      lastVersion: 0,
      selected: {
        tool: new Set(),
        model: new Set(),
        agent: new Set(),
        session: new Set(),
      },
      selectAll: {
        tool: true,
        model: true,
        agent: true,
        session: true,
      },
      searchText: {
        tool: '',
        model: '',
        agent: '',
        session: '',
      },
    };

    const dropdownDefs = [
      { key: 'tool', label: 'Tools', container: 'tool-dropdown', searchPlaceholder: 'Search tools...', mono: false },
      { key: 'model', label: 'Models', container: 'model-dropdown', searchPlaceholder: 'Search models...', mono: false },
      { key: 'agent', label: 'Agents', container: 'agent-dropdown', searchPlaceholder: 'Search agents...', mono: false },
      { key: 'session', label: 'Sessions', container: 'session-dropdown', searchPlaceholder: 'Search sessions...', mono: true },
    ];

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function getArchiveMode() {
      return document.getElementById('archived-mode').value;
    }

    function buildQuery(params = {}) {
      const q = new URLSearchParams();
      q.set('page', String(state.currentPage));
      q.set('pageSize', document.getElementById('per-page').value);
      q.set('sortField', document.getElementById('sort-field').value);
      q.set('sortOrder', document.getElementById('sort-order').value);
      q.set('archived', getArchiveMode());

      const search = document.getElementById('search').value.trim();
      const dateFrom = document.getElementById('date-from').value;
      const dateTo = document.getElementById('date-to').value;
      if (search) q.set('search', search);
      if (dateFrom) q.set('dateFrom', dateFrom);
      if (dateTo) q.set('dateTo', dateTo);

      for (const key of ['tool', 'model', 'agent', 'session']) {
        if (!state.selectAll[key]) {
          const values = Array.from(state.selected[key]);
          if (values.length) q.set(key, values.join(','));
          else q.set(key, '__none__');
        }
      }

      for (const [k, v] of Object.entries(params)) {
        q.set(k, v);
      }
      return q.toString();
    }

    function displayLabel(key, totalCount, fallback) {
      const selectedCount = state.selected[key].size;
      if (selectedCount === 0) return `No ${fallback}`;
      if (state.selectAll[key] || selectedCount === totalCount) return fallback;
      if (selectedCount === 1) return Array.from(state.selected[key])[0];
      return `${selectedCount} ${fallback.toLowerCase()}`;
    }

    function applyMetaToTotals(meta) {
      state.meta = meta;
      state.lastVersion = meta.datasetVersion || state.lastVersion || 0;
      document.getElementById('total-calls').textContent = meta.total.toLocaleString();
      document.getElementById('unique-types').textContent = meta.uniqueTypes;
      document.getElementById('sessions-count').textContent = meta.uniqueSessions;
      document.getElementById('agents-count').textContent = meta.uniqueAgents;
      document.getElementById('indexed-files').textContent = meta.indexedFiles.toLocaleString();
      document.getElementById('filtered-calls').textContent = meta.total.toLocaleString();
      document.getElementById('filtered-types').textContent = meta.uniqueTypes;
      document.getElementById('filtered-sessions').textContent = meta.uniqueSessions;
    }

    function syncSelectionsFromMeta() {
      if (!state.meta) return;
      const maps = {
        tool: state.meta.tools,
        model: state.meta.models,
        agent: state.meta.agents,
        session: state.meta.sessions,
      };
      for (const key of Object.keys(maps)) {
        const names = Object.keys(maps[key]);
        if (state.selectAll[key]) {
          state.selected[key] = new Set(names);
        } else {
          state.selected[key] = new Set(Array.from(state.selected[key]).filter(v => names.includes(v)));
        }
      }
    }

    function renderDropdown(def) {
      const map = state.meta?.[
        def.key === 'tool' ? 'tools' : def.key === 'model' ? 'models' : def.key === 'agent' ? 'agents' : 'sessions'
      ] || {};
      const totalCount = Object.keys(map).length;
      const q = state.searchText[def.key].toLowerCase();
      const entries = Object.entries(map)
        .sort((a, b) => b[1] - a[1])
        .filter(([name]) => !q || name.toLowerCase().includes(q))
        .slice(0, def.key === 'session' ? 100 : 200);

      const html = `
        <button class="dropdown-btn" onclick="toggleDropdown('${def.key}')">
          <span>${escapeHtml(displayLabel(def.key, totalCount, def.label))}</span>
        </button>
        <div class="dropdown-content" id="${def.key}-dropdown-content">
          <div class="dropdown-search">
            <input type="text" placeholder="${def.searchPlaceholder}" value="${escapeHtml(state.searchText[def.key])}" oninput="setDropdownSearch('${def.key}', this.value)" onclick="event.stopPropagation()">
          </div>
          <div class="dropdown-actions">
            <button onclick="selectAll('${def.key}')">All</button>
            <button onclick="selectNone('${def.key}')">None</button>
          </div>
          <div>
            ${entries.map(([name, count]) => {
              const checked = state.selected[def.key].has(name) ? 'checked' : '';
              const cls = def.mono ? 'name monospace' : 'name';
              return `<label class="dropdown-item"><input type="checkbox" value="${escapeHtml(name)}" ${checked} onchange="toggleOption('${def.key}', ${JSON.stringify(name).replace(/"/g, '&quot;')})"><span class="${cls}">${escapeHtml(def.key === 'session' ? name : name)}</span><span class="count">${count}</span></label>`;
            }).join('') || '<div class="dropdown-item"><span class="name">No matches</span></div>'}
          </div>
        </div>
      `;
      document.getElementById(def.container).innerHTML = html;
    }

    function renderAllDropdowns() {
      dropdownDefs.forEach(renderDropdown);
    }

    function toggleDropdown(key) {
      const el = document.getElementById(`${key}-dropdown-content`);
      el.classList.toggle('show');
    }

    function setDropdownSearch(key, value) {
      state.searchText[key] = value;
      const def = dropdownDefs.find(d => d.key === key);
      renderDropdown(def);
      document.getElementById(`${key}-dropdown-content`).classList.add('show');
    }

    function toggleOption(key, value) {
      if (state.selected[key].has(value)) state.selected[key].delete(value);
      else state.selected[key].add(value);
      const metaMap = state.meta[key === 'tool' ? 'tools' : key === 'model' ? 'models' : key === 'agent' ? 'agents' : 'sessions'] || {};
      state.selectAll[key] = state.selected[key].size === Object.keys(metaMap).length;
      state.currentPage = 1;
      reload();
    }

    function selectAll(key) {
      const metaMap = state.meta[key === 'tool' ? 'tools' : key === 'model' ? 'models' : key === 'agent' ? 'agents' : 'sessions'] || {};
      state.selected[key] = new Set(Object.keys(metaMap));
      state.selectAll[key] = true;
      state.currentPage = 1;
      reload();
    }

    function selectNone(key) {
      state.selected[key] = new Set();
      state.selectAll[key] = false;
      state.currentPage = 1;
      reload();
    }

    async function fetchMeta() {
      const res = await fetch(`/api/meta?${buildQuery()}`);
      if (!res.ok) throw new Error(`Meta load failed (${res.status})`);
      const meta = await res.json();
      applyMetaToTotals(meta);
      syncSelectionsFromMeta();
      renderAllDropdowns();
    }

    async function fetchPage() {
      const res = await fetch(`/api/tools?${buildQuery()}`);
      if (!res.ok) throw new Error(`Page load failed (${res.status})`);
      const data = await res.json();
      state.items = data.items;
      renderTable(data.items);
      renderPagination(data.pagination);
    }

    async function reload() {
      try {
        await fetchMeta();
        await fetchPage();
      } catch (e) {
        document.getElementById('content').innerHTML = `<div class="loading">Error loading data: ${escapeHtml(e.message)}</div>`;
      }
    }

    function isSimpleLiveView() {
      return state.currentPage === 1
        && document.getElementById('sort-field').value === 'timestamp'
        && document.getElementById('sort-order').value === 'desc'
        && getArchiveMode() === 'exclude'
        && !document.getElementById('search').value.trim()
        && !document.getElementById('date-from').value
        && !document.getElementById('date-to').value
        && Object.values(state.selectAll).every(Boolean);
    }

    async function handleLiveEvent(payload) {
      if (!payload || payload.version <= state.lastVersion) return;

      if (payload.meta) {
        applyMetaToTotals(payload.meta);
        syncSelectionsFromMeta();
        renderAllDropdowns();
      }

      const added = Array.isArray(payload.delta?.added) ? payload.delta.added.filter(call => !call.archived) : [];
      const removed = payload.delta?.removed || 0;

      if (isSimpleLiveView() && added.length && removed === 0) {
        const pageSize = parseInt(document.getElementById('per-page').value, 10);
        const seen = new Set(state.items.map(item => item.id));
        const fresh = added.filter(item => !seen.has(item.id));
        if (fresh.length) {
          state.items = [...fresh, ...state.items].slice(0, pageSize);
          renderTable(state.items);
          const totalPages = Math.max(1, Math.ceil((state.meta?.total || state.items.length) / pageSize));
          renderPagination({
            page: 1,
            total: state.meta?.total || state.items.length,
            totalPages,
          });
          showToast(`+${fresh.length} new tool call${fresh.length > 1 ? 's' : ''}`);
          return;
        }
      }

      await fetchPage();
      if (added.length) {
        showToast(`+${added.length} new tool call${added.length > 1 ? 's' : ''}`);
      } else if (removed > 0) {
        showToast('Tool history updated');
      }
    }

    function renderTable(items) {
      const sf = document.getElementById('sort-field').value;
      const dir = document.getElementById('sort-order').value === 'desc' ? '↓' : '↑';
      const arrow = (field) => sf === field ? dir : '';
      let html = `
        <table>
          <colgroup>
            <col class="col-tool"><col class="col-args"><col class="col-time"><col class="col-model"><col class="col-agent"><col class="col-session"><col class="col-copy">
          </colgroup>
          <thead>
            <tr>
              <th onclick="setSort('name')">Tool ${arrow('name')}</th>
              <th>Arguments</th>
              <th onclick="setSort('timestamp')">Time ${arrow('timestamp')}</th>
              <th onclick="setSort('model')">Model ${arrow('model')}</th>
              <th onclick="setSort('agent')">Agent ${arrow('agent')}</th>
              <th onclick="setSort('sessionId')">Session ${arrow('sessionId')}</th>
              <th>Copy</th>
            </tr>
          </thead>
          <tbody>
      `;

      items.forEach((call, index) => {
        const args = call.arguments ? JSON.stringify(call.arguments, null, 2) : '-';
        html += `
          <tr>
            <td><span class="tool-name">${escapeHtml(call.name)}</span></td>
            <td><div class="arguments" ondblclick="copyArgs(${index}); event.stopPropagation();">${escapeHtml(args)}</div></td>
            <td class="timestamp">${escapeHtml(relativeTime(call.timestamp))}</td>
            <td class="model">${escapeHtml(call.model || '-')}</td>
            <td class="session-id">${escapeHtml(call.agent || '-')}</td>
            <td class="session-id monospace">${escapeHtml(call.sessionId || '-')}</td>
            <td><button class="copy-btn" onclick="copyRow(${index})">📋</button></td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      document.getElementById('content').innerHTML = html;
    }

    function renderPagination(pagination) {
      const totalPages = pagination.totalPages || 1;
      state.currentPage = pagination.page;
      document.getElementById('pagination').innerHTML = `
        <button ${pagination.page === 1 ? 'disabled' : ''} onclick="goPage(1)">«</button>
        <button ${pagination.page === 1 ? 'disabled' : ''} onclick="goPage(${pagination.page - 1})">‹</button>
        <span class="page-info">Page ${pagination.page} of ${totalPages} (${pagination.total.toLocaleString()} results)</span>
        <button ${pagination.page === totalPages ? 'disabled' : ''} onclick="goPage(${pagination.page + 1})">›</button>
        <button ${pagination.page === totalPages ? 'disabled' : ''} onclick="goPage(${totalPages})">»</button>
      `;
    }

    function goPage(page) {
      state.currentPage = page;
      fetchPage();
      window.scrollTo(0, 0);
    }

    function setSort(field) {
      const sortField = document.getElementById('sort-field');
      const sortOrder = document.getElementById('sort-order');
      if (sortField.value === field) {
        sortOrder.value = sortOrder.value === 'desc' ? 'asc' : 'desc';
      } else {
        sortField.value = field;
        sortOrder.value = 'desc';
      }
      state.currentPage = 1;
      reload();
    }

    function relativeTime(timestamp) {
      const diff = Date.now() - new Date(timestamp).getTime();
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return new Date(timestamp).toLocaleDateString();
    }

    function showToast(msg) {
      const toast = document.getElementById('copy-toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function copyRow(index) {
      copyText(state.items[index]);
    }

    function copyArgs(index) {
      const call = state.items[index];
      copyText(call?.arguments ? JSON.stringify(call.arguments, null, 2) : '-');
    }

    function copyText(text) {
      const value = typeof text === 'string' ? text : JSON.stringify(text, null, 2);
      if (navigator.clipboard) {
        navigator.clipboard.writeText(value).then(() => showToast('Copied to clipboard!')).catch(() => fallbackCopy(value));
        return;
      }
      fallbackCopy(value);
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); showToast('Copied to clipboard!'); }
      catch { showToast('Copy failed'); }
      document.body.removeChild(ta);
    }

    async function exportData() {
      const res = await fetch(`/api/tools?${buildQuery({ all: 'true' })}`);
      const data = await res.json();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `tool-calls-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast(`Exported ${data.length} calls`);
    }

    function clearFilters() {
      document.getElementById('search').value = '';
      document.getElementById('date-from').value = '';
      document.getElementById('date-to').value = '';
      document.getElementById('archived-mode').value = 'exclude';
      document.getElementById('sort-field').value = 'timestamp';
      document.getElementById('sort-order').value = 'desc';
      for (const key of Object.keys(state.selected)) {
        state.selected[key] = new Set();
        state.selectAll[key] = true;
        state.searchText[key] = '';
      }
      state.currentPage = 1;
      reload();
    }

    function connectSSE() {
      if (state.eventSource) state.eventSource.close();
      state.eventSource = new EventSource('/api/events');
      document.getElementById('refresh-indicator').classList.add('active');
      state.eventSource.onmessage = async (event) => {
        try {
          const payload = JSON.parse(event.data);
          await handleLiveEvent(payload);
        } catch (e) {
          console.error('SSE update failed:', e);
        }
      };
      state.eventSource.onerror = () => console.log('SSE reconnecting...');
    }

    function toggleAutoRefresh() {
      const enabled = document.getElementById('auto-refresh-toggle').checked;
      const indicator = document.getElementById('refresh-indicator');
      if (enabled) {
        indicator.classList.add('active');
        connectSSE();
        showToast('Live updates enabled');
      } else {
        indicator.classList.remove('active');
        if (state.eventSource) state.eventSource.close();
        state.eventSource = null;
        showToast('Live updates disabled');
      }
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown')) {
        document.querySelectorAll('.dropdown-content').forEach(el => el.classList.remove('show'));
      }
    });

    let searchTimer = null;
    document.getElementById('search').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { state.currentPage = 1; reload(); }, 120);
    });
    document.getElementById('date-from').addEventListener('change', () => { state.currentPage = 1; reload(); });
    document.getElementById('date-to').addEventListener('change', () => { state.currentPage = 1; reload(); });
    document.getElementById('archived-mode').addEventListener('change', () => { state.currentPage = 1; reload(); });
    document.getElementById('per-page').addEventListener('change', () => { state.currentPage = 1; fetchPage(); });
    document.getElementById('sort-field').addEventListener('change', () => { state.currentPage = 1; reload(); });
    document.getElementById('sort-order').addEventListener('change', () => { state.currentPage = 1; reload(); });
    document.getElementById('auto-refresh-toggle').addEventListener('change', toggleAutoRefresh);

    reload();
    connectSSE();
  </script>
</body>
</html>
